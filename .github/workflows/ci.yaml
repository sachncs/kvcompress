name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CPU torch
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check kvcompress tests examples scripts

      - name: Format check
        run: ruff format --check kvcompress tests examples scripts

      - name: Type check
        run: mypy kvcompress

      - name: Unit tests + coverage
        run: |
          python -m pytest --cov=kvcompress --cov-report=term-missing \
                 -m "not slow and not integration and not gpu"

      - name: Coverage gate
        run: |
          coverage report --fail-under=90