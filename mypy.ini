[mypy]
python_version = 3.12
strict = False
warn_unused_ignores = True
warn_return_any = True
ignore_missing_imports = True

[[mypy.overrides]]
module = "torch.*"
ignore_missing_imports = True

[[mypy.overrides]]
module = "transformers.*"
ignore_missing_imports = True

[[mypy.overrides]]
module = "triton.*"
ignore_missing_imports = True
