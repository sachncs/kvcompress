# Vulture configuration for kvcompress.
#
# Vulture's 60%-confidence findings flag a lot of internal-but-useful symbols
# (CompressorFactory, __getattr__, _LayerEntry, _resolve_cache, etc.). We use
# 80% as the floor and exclude common library-internal patterns explicitly.
[tool.vulture]
min_confidence = 80
exclude = [
    # ``if False: ... # TYPE_CHECKING`` is intentional — used by lazy-export
    # subpackages so the public surface is importable even when modules are
    # mid-edit. vulture flags the unsatisfiable ``if`` at 100% confidence.
    "src/kvcompress/**/__init__.py",
    # Stub / abstract methods that subclasses fill in.
    "src/kvcompress/compressor/base.py",
    # Properties / dataclass field names (vulture's string match is
    # imprecise on dataclass-heavy modules).
    "src/kvcompress/compressor/tucker.py",
    # Tests have dead helpers we don't care about.
    "tests/",
    # Benchmarks have dead CLI plumbing (version, validate, profile subcommands
    # are also exposed through kvcompress.cli but vulture sees them as unused
    # inside benchmarks/*).
    "src/kvcompress/benchmarks/",
]
paths = ["src/kvcompress/"]
[tool.vulture]
min_confidence = 80
paths = ["src/kvcompress"]
exclude_patterns = [
    "*/__init__.py",
    "src/kvcompress/compressor/base.py",
    "src/kvcompress/compressor/tucker.py",
    "tests/",
    "src/kvcompress/benchmarks/",
]
